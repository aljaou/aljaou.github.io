<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klascam - Schoolfotografie</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
scroll-behavior:smooth;
}

body{
background:#f6f9fc;
color:#1f2a37;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:white;
box-shadow:0 2px 12px rgba(0,0,0,0.05);
z-index:1000;
}

nav h1{
color:#1e88e5;
font-weight:700;
letter-spacing:2px;
}

nav a{
margin-left:18px;
text-decoration:none;
color:#1f2a37;
font-size:14px;
opacity:.7;
font-weight:500;
}

nav a:hover{
opacity:1;
color:#1e88e5;
}

/* TOP BAR */
.topbar{
position:fixed;
top:70px;
right:40px;
display:flex;
gap:10px;
z-index:2000;
}

.topbar input{
padding:10px;
border-radius:30px;
border:1px solid #ddd;
}

.topbar button{
padding:10px 15px;
border:none;
border-radius:30px;
background:#00c853;
color:white;
cursor:pointer;
font-weight:600;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:0 10%;
background:linear-gradient(135deg,#e3f2fd,#ffffff,#e8f5e9);
}

.hero h1{
font-size:60px;
font-weight:700;
}

.subtitle{
margin-top:20px;
max-width:700px
